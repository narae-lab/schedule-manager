<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-alt:#FBFBFA;
    --active-bg:#E9E9E7;
    --note-bg:#FFF8E1; --note-border:#F0E4B8; --note-text:#4A4A4A;
    --panel:#F1F1EF;
    --font-main:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --border:#E9E9E7;
    --text:#37352F;
    --text-sec:#9B9A97;
    --blue:#2382E2;
    --blue-soft:#E7F3F8;

    --pri-high-bg:#FFE2DD; --pri-high-text:#C4554D;
    --pri-mid-bg:#FDECC8;  --pri-mid-text:#B08207;
    --pri-low-bg:#DDEDEA;  --pri-low-text:#2B8A6D;

    --time-bg:#FAEBDD; --time-text:#B9762D;
    --time-t1-bg:#E3EEFC; --time-t1-text:#3B6FC2;
    --time-t2-bg:#F1E6FA; --time-t2-text:#8B5FBF;
    --time-t3-bg:#FDE6EE; --time-t3-text:#C25B85;
    --repeat-bg:#E8E5F5; --repeat-text:#6B5DAB;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-main);
    font-size:14px;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  .app{ display:flex; min-height:100vh; }

  /* ---- left nav ---- */
  .rail{
    width:168px; flex-shrink:0;
    background:var(--surface-alt);
    border-right:1px solid var(--border);
    padding:20px 0;
  }
  .rail-title{
    font-weight:700; font-size:14px; padding:0 16px 14px 16px;
    display:flex; align-items:center; gap:6px;
  }
  .rail-title .ck-icon{color:#2B8A6D;font-size:15px;}
  .tab-btn{
    width:100%; text-align:left; background:none; border:none;
    font-family:inherit; font-size:13.5px; color:var(--text);
    padding:7px 16px; cursor:pointer; display:flex; align-items:center;
    gap:8px; border-radius:4px;
  }
  .tab-btn:hover{ background:var(--panel); }
  .tab-btn.active{ background:var(--active-bg); font-weight:700; }
  .tab-btn:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; }
  .tab-icon{ font-size:14px; opacity:0.75; }
  .tab-label{ flex:1; }
  .tab-edit{
    font-size:11px; opacity:0; color:var(--text-sec); cursor:pointer; padding:2px 3px;
  }
  .tab-btn:hover .tab-edit{ opacity:0.7; }
  .tab-edit:hover{ opacity:1 !important; color:var(--blue); }
  .tab-label-input{
    flex:1; font-family:inherit; font-size:13.5px; border:1px solid var(--blue); border-radius:3px;
    padding:1px 4px; width:100%;
  }

  /* ---- main ---- */
  .main{ flex:1; min-width:0; padding:0; overflow-x:hidden; }
  .view{ display:none; padding:32px 40px; }
  .view.active{ display:block; }

  .section-bar{
    background:var(--panel);
    padding:10px 16px;
    font-weight:700;
    font-size:16px;
    border-radius:4px;
    margin-bottom:0;
  }
  .toolbar{
    display:flex; align-items:center; gap:6px;
    padding:8px 4px;
    border-bottom:1px solid var(--border);
    font-size:12.5px;
    color:var(--text-sec);
  }
  .toolbar .spacer{ flex:1; }

  table.dbtable{ width:100%; max-width:100%; border-collapse:collapse; margin-bottom:26px; table-layout:fixed; }
  table.dbtable th{
    text-align:left; font-weight:500; color:var(--text-sec); font-size:12.5px;
    padding:6px 10px; border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    white-space:nowrap; position:relative;
  }
  table.dbtable th:last-child, table.dbtable td:last-child{ border-right:none; }
  table.dbtable td{
    padding:7px 10px; border-bottom:1px solid var(--border); border-right:1px solid var(--border);
    vertical-align:middle; font-size:13.5px;
  }
  table.dbtable tr:hover td{ background:var(--surface-alt); }
  .col-pri{ width:60px; }
  .col-time{ width:64px; }
  .col-ck{ width:34px; text-align:center !important; padding-left:0 !important; padding-right:0 !important; }
  .col-date{ width:110px; }
  .col-action{ width:96px; }
  .col-comment{ width:180px; }
  .col-cat{ width:110px; }

  select.cell-select{
    border:none; background:none; font-family:inherit; font-size:12.5px; cursor:pointer;
    padding:2px; color:inherit; width:100%; text-align:center; text-align-last:center;
  }
  select.cell-select:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; border-radius:3px; }

  .badge{
    display:inline-block; padding:2px 8px; border-radius:11px; font-size:12px; font-weight:500;
  }
  .badge-select{ border:none; -webkit-appearance:none; appearance:none; cursor:pointer; font-family:inherit; }
  .pri-high{ background:var(--pri-high-bg) !important; color:var(--pri-high-text) !important; }
  .pri-mid{ background:var(--pri-mid-bg) !important; color:var(--pri-mid-text) !important; }
  .pri-low{ background:var(--pri-low-bg) !important; color:var(--pri-low-text) !important; }
  .time-badge{ background:var(--time-bg) !important; color:var(--time-text) !important; }
  .time-t1{ background:var(--time-t1-bg) !important; color:var(--time-t1-text) !important; }
  .time-t2{ background:var(--time-t2-bg) !important; color:var(--time-t2-text) !important; }
  .time-t3{ background:var(--time-t3-bg) !important; color:var(--time-t3-text) !important; }
  .repeat-select{
    border:none; background:var(--repeat-bg); color:var(--repeat-text); font-size:11px;
    margin-left:0; border-radius:11px; padding:2px 6px; cursor:pointer; font-family:inherit;
  }
  .repeat-select:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; }
  .task-cell-row{ display:flex; align-items:center; gap:6px; flex-wrap:nowrap; }
  .task-cell-row input.cell-text{ flex:1; min-width:0; }
  .task-cell-row .repeat-select{ flex-shrink:0; }

  input[type="checkbox"].ck{
    width:16px; height:16px; cursor:pointer; accent-color:var(--blue);
  }
  input.cell-text{
    border:1px solid transparent; background:none; font-family:inherit; font-size:13.5px;
    width:100%; padding:3px 4px; color:inherit;
  }
  input.cell-text:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; border-radius:3px; background:var(--surface); }
  input.cell-text.done{ text-decoration:line-through; color:var(--text-sec); }
  input.cat-input{ border-radius:11px; }
  input.cell-date{
    border:none; background:none; font-family:'IBM Plex Mono',monospace; font-size:12.5px; width:100%; color:inherit;
  }
  input.cell-date:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; border-radius:3px; }

  .row-del{ background:none;border:none;color:var(--text-sec);cursor:pointer;font-size:15px;padding:2px 6px;opacity:0; }
  tr:hover .row-del{ opacity:1; }
  .row-del:hover{ color:#C4554D; }

  .move-btn{
    background:var(--blue-soft); color:var(--blue); border:none; border-radius:4px;
    font-size:12px; padding:4px 9px; cursor:pointer; font-weight:500; white-space:nowrap;
  }
  .move-btn:hover{ background:#D5EAF6; }

  .add-row td{ color:var(--text-sec); cursor:pointer; padding:8px 10px; }
  .add-row:hover td{ background:var(--surface-alt); }
  .add-row .plus{ margin-right:4px; }

  .empty-row td{ color:var(--text-sec); font-style:normal; padding:16px 10px; }

  /* calendar */
  .cal-nav{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .cal-nav button{ background:none;border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:14px; }
  .cal-nav button:hover{ background:var(--panel); }
  .cal-nav .label{ font-weight:700; font-size:15px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:1px solid var(--border); }
  .cal-dow{ background:var(--panel); text-align:center; font-size:11px; color:var(--text-sec); padding:6px 0; }
  .cal-cell{ background:var(--surface); min-height:78px; padding:6px; cursor:pointer; }
  .cal-cell:hover{ background:var(--blue-soft); }
  .cal-cell.empty-cell{ background:var(--surface-alt); cursor:default; }
  .cal-cell.empty-cell:hover{ background:var(--surface-alt); }
  .cal-cell.today{ box-shadow:inset 0 0 0 2px var(--blue); }
  .cal-date{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--text-sec); }
  .cal-dots{ display:flex; gap:3px; margin-top:6px; flex-wrap:wrap; }
  .dot{ width:6px;height:6px;border-radius:50%; background:var(--blue); }
  .dot.high{ background:#C4554D; }
  .dot.repeat-dot{ background:transparent; border:1.5px solid var(--blue); }
  .cal-tags{ margin-top:4px; display:flex; flex-direction:column; gap:2px; }
  .cal-tag{
    font-size:9.5px; padding:1px 5px; border-radius:3px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; font-weight:500;
  }
  .cal-tag-more{ font-size:9.5px; color:var(--text-sec); }
  .cal-detail{ margin-top:20px; }

  /* memo */
  .memo-cat-row{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .memo-cat-chip{
    padding:5px 12px; border-radius:6px; font-size:13px; cursor:pointer; border:1px solid var(--border);
    background:var(--surface); color:var(--text);
  }
  .memo-cat-chip.active{ background:var(--text); color:var(--bg); border-color:var(--text); }
  .memo-cat-manage{ font-size:12px; color:var(--text-sec); background:none;border:1px dashed var(--border);border-radius:6px;padding:5px 10px;cursor:pointer; }
  .memo-form{ display:flex; gap:8px; margin-bottom:18px; }
  .memo-form select{ padding:8px; border:1px solid var(--border); border-radius:4px; font-family:inherit; font-size:12.5px; background:var(--surface); color:var(--text); }
  .memo-form textarea{ flex:1; min-height:60px; padding:9px 11px; border:1px solid var(--border); border-radius:4px; font-family:inherit; font-size:13.5px; resize:vertical; background:var(--surface); color:var(--text); }
  .memo-form button{ background:var(--blue); color:#fff; border:none; border-radius:4px; padding:0 18px; font-weight:700; cursor:pointer; }
  .memo-item{ border-bottom:1px solid var(--border); padding:12px 4px; }
  .memo-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .memo-date{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-sec); }
  .memo-cat-tag{ font-size:11px; padding:2px 8px; border-radius:10px; background:var(--panel); color:var(--text-sec); }
  .memo-text{ font-size:13.5px; line-height:1.55; white-space:pre-wrap; }
  .memo-del{ background:none;border:none;color:var(--text-sec);font-size:12px;cursor:pointer; }
  .memo-del:hover{ color:#C4554D; }

  .save-note{ font-size:11px; color:var(--text-sec); padding:0 16px; min-height:14px; }

  .theme-picker{ padding:12px 16px 4px 16px; border-top:1px solid var(--border); margin-top:8px; }
  .theme-picker label{ display:block; font-size:11px; color:var(--text-sec); margin-bottom:4px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .theme-picker select{
    width:100%; padding:5px 7px; border:1px solid var(--border); border-radius:4px;
    font-family:inherit; font-size:12.5px; background:var(--surface); color:var(--text); cursor:pointer;
  }
  .theme-picker select:focus-visible{ outline:2px solid var(--blue); }

  .quick-note-box{
    background:var(--note-bg); border:1px solid var(--note-border); border-radius:6px;
    padding:12px 14px; margin-bottom:20px;
  }
  .quick-note-label{ font-size:12.5px; font-weight:700; color:var(--note-text); margin-bottom:6px; }
  .quick-note-box textarea{
    width:100%; min-height:54px; border:none; background:transparent; resize:vertical;
    font-family:inherit; font-size:13.5px; color:var(--note-text);
  }
  .quick-note-box textarea:focus-visible{ outline:2px solid var(--blue); border-radius:4px; }

  .cat-editor{ display:none; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; background:var(--panel); padding:10px; border-radius:6px; }
  .cat-editor.show{ display:flex; }
  .cat-editor input{ padding:5px 8px; border:1px solid var(--border); border-radius:4px; font-family:inherit; font-size:12.5px; background:var(--surface); color:var(--text); }
  .cat-editor .cat-row{ display:flex; gap:4px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:4px 6px; }
  .cat-editor .cat-row button{ background:none;border:none;color:var(--text-sec);cursor:pointer;font-size:12px; }
  .cat-editor .cat-row button:hover{ color:#C4554D; }

  .today-layout{ display:flex; gap:24px; align-items:flex-start; }
  .today-main{ flex:1; min-width:0; overflow-x:hidden; }
  .today-sidebar{
    width:230px; flex-shrink:0;
    background:var(--surface-alt); border:1px solid var(--border); border-radius:6px;
    padding:14px; min-height:420px;
  }
  .sidebar-title{ font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; }
  .sidebar-sub{ font-size:11.5px; color:var(--text-sec); margin-bottom:12px; }
  .today-sidebar table.dbtable{ margin-bottom:0; }
  .today-sidebar table.dbtable th, .today-sidebar table.dbtable td{ padding:5px 6px; font-size:12px; }
  .today-sidebar .add-row td{ font-size:12px; padding:6px; }
  .today-sidebar .empty-row td{ font-size:11.5px; padding:10px 6px; }

  .resizer-v{ width:6px; flex-shrink:0; cursor:col-resize; position:relative; align-self:stretch; }
  .resizer-v::before{ content:''; position:absolute; top:0; bottom:0; left:2px; width:1px; background:var(--border); }
  .resizer-v::after{
    content:''; position:absolute; top:50%; left:2px; transform:translate(-50%,-50%);
    width:6px; height:18px; background:var(--surface-alt); border:1px solid var(--text-sec); border-radius:5px;
  }
  .resizer-v:hover::before, .resizer-v.active::before{ background:var(--text-sec); width:2px; left:2px; }
  .resizer-v:hover::after, .resizer-v.active::after{ background:var(--text-sec); border-color:var(--text-sec); }

  .col-resize-handle{
    position:absolute; top:0; right:-3px; width:6px; height:100%; cursor:col-resize; z-index:2;
  }
  .col-resize-handle::after{
    content:''; position:absolute; top:2px; bottom:2px; left:2px; width:1px; background:transparent;
  }
  .col-resize-handle:hover::after, .col-resize-handle.active::after{ background:var(--text-sec); width:2px; }

  .login-overlay{
    position:fixed; inset:0; background:var(--bg); z-index:1000;
    display:flex; align-items:center; justify-content:center;
  }
  .login-card{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:40px 44px; text-align:center; max-width:340px;
  }
  .login-card h1{ font-size:20px; margin:0 0 6px 0; }
  .login-card p{ font-size:13px; color:var(--text-sec); margin:0 0 24px 0; }
  .google-btn{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:6px;
    background:var(--surface); color:var(--text); font-family:inherit; font-size:14px; font-weight:500;
    cursor:pointer;
  }
  .google-btn:hover{ background:var(--surface-alt); }
  .login-error{ color:#C4554D; font-size:12.5px; margin-top:14px; min-height:16px; }
  .signout-btn{
    background:none; border:none; color:var(--text-sec); font-size:11.5px; cursor:pointer;
    padding:0 16px; text-align:left; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    width:100%; display:block;
  }
  .signout-btn:hover{ color:var(--text); text-decoration:underline; }
  #app-root{ display:none; }

  .notice-banner{
    display:flex; align-items:center; gap:10px; background:var(--pri-high-bg); color:var(--pri-high-text);
    padding:10px 14px; border-radius:6px; margin-bottom:12px; font-weight:600; font-size:13.5px;
  }
  .notice-banner .notice-icon{ font-size:15px; }
  .notice-banner .notice-item{ font-weight:600; }
  .notice-banner .notice-range{ font-weight:400; opacity:0.8; font-size:12px; margin-left:4px; }
  .banner-alert{
    display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:6px;
    margin-bottom:12px; font-weight:600; font-size:13.5px;
  }
  .banner-red{ background:var(--pri-high-bg); color:var(--pri-high-text); }
  .banner-blue{ background:var(--blue-soft); color:var(--blue); }
  .banner-amber{ background:var(--pri-mid-bg); color:var(--pri-mid-text); }
  .nav-badge{
    background:var(--pri-high-bg); color:var(--pri-high-text); font-size:10.5px; font-weight:700;
    padding:1px 6px; border-radius:9px; margin-left:2px; display:none;
  }

  .cal-notice-bar{
    font-size:9.5px; padding:1px 5px; border-radius:3px; margin-bottom:3px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; font-weight:700; background:var(--pri-high-bg); color:var(--pri-high-text);
  }

  .notice-add-form{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
  .notice-add-form input[type="text"]{
    flex:1; min-width:160px; padding:7px 10px; border:1px solid var(--border); border-radius:4px;
    font-family:inherit; font-size:13px; background:var(--surface); color:var(--text);
  }
  .notice-add-form label{ font-size:11.5px; color:var(--text-sec); display:flex; align-items:center; gap:5px; }
  .notice-add-form input[type="date"]{
    padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-family:'IBM Plex Mono',monospace;
    font-size:12px; background:var(--surface); color:var(--text);
  }
  .notice-add-form button{
    background:var(--blue); color:#fff; border:none; border-radius:4px; padding:7px 14px;
    font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .notice-row{
    display:flex; justify-content:flex-start; align-items:center; gap:8px; padding:8px 10px;
    border:1px solid var(--border); border-radius:4px; margin-bottom:6px; font-size:13px;
  }
  .notice-row .notice-row-range{ color:var(--text-sec); font-size:11.5px; margin-left:6px; }

  .color-swatch-row{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .color-swatch{
    width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0;
  }
  .color-swatch.selected{ border-color:var(--text); }

  .rich-toolbar{ display:flex; gap:4px; margin-bottom:6px; }
  .rich-btn{
    width:24px; height:24px; border:1px solid var(--border); background:var(--surface);
    border-radius:4px; cursor:pointer; font-size:12px; color:var(--text); line-height:1;
  }
  .rich-btn:hover{ background:var(--active-bg); }
  .rich-btn[data-cmd="underline"]{ text-decoration:underline; }
  .rich-editable{
    min-height:54px; outline:none; padding:6px 7px; border:1px solid var(--border); border-radius:4px;
    background:var(--surface); color:var(--text); font-family:inherit; font-size:13.5px; line-height:1.5;
  }
  .rich-editable:focus-visible{ outline:2px solid var(--blue); outline-offset:-2px; }
  .rich-editable:empty::before{ content:attr(data-placeholder); color:var(--text-sec); }
  .quick-note-box .rich-editable, .today-sidebar .rich-editable{ background:transparent; border:none; padding:0; min-height:44px; }
  .quick-note-box .rich-toolbar .rich-btn, .today-sidebar .rich-toolbar .rich-btn{ background:transparent; }
</style>
</head>
<body>
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h1>Schedule</h1>
    <p>Sign in with Google to sync your schedule.</p>
    <button class="google-btn" id="google-signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.03l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.97l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>

let ACTIVE_CATEGORY_PALETTE = CATEGORY_PALETTE_PASTEL;

function hashColor(str){
  if(!str) return null;
  let h=0; for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return ACTIVE_CATEGORY_PALETTE[h % ACTIVE_CATEGORY_PALETTE.length];
}

function applyTheme(name){
  const theme = THEMES[name] || THEMES.pastel;
  Object.entries(theme.vars).forEach(([k,v])=> document.documentElement.style.setProperty(k, v));
  document.documentElement.style.colorScheme = theme.colorScheme;
  ACTIVE_CATEGORY_PALETTE = theme.category;
  document.getElementById('theme-select').value = name;
}

function pad(n){ return String(n).padStart(2,'0'); }
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function getWeekRange(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const diffToMonday = (day===0 ? -6 : 1-day);
  const monday = new Date(d); monday.setDate(d.getDate()+diffToMonday);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt = x => x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate());
  return { start: fmt(monday), end: fmt(sunday) };
}
const WEEK_RANGE = getWeekRange(TODAY);

let state = { tasks: [], memos: [], completions: {}, memoCats: [...DEFAULT_CATS], quickNote: '', tabNames: {...DEFAULT_TAB_NAMES}, upcoming: [], upcomingNote: '', weekNote: '', notices: [], theme: 'pastel', layout: { railWidth:168, sidebarWidth:230, todayCols:{}, allCols:{}, upCols:{} } };

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

async function loadState(){
  try{
    const { data, error } = await supabaseClient
      .from('schedule_app_state')
      .select('state')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    if(error) throw error;
    if(data && data.state){
      const parsed = data.state;
      state = Object.assign({tasks:[],memos:[],completions:{},memoCats:[...DEFAULT_CATS],quickNote:'',tabNames:{...DEFAULT_TAB_NAMES},upcoming:[],upcomingNote:'',weekNote:'',notices:[],theme:'pastel',layout:{railWidth:168,sidebarWidth:230,todayCols:{},allCols:{},upCols:{}}}, parsed);
      if(!state.memoCats || state.memoCats.length===0) state.memoCats = [...DEFAULT_CATS];
      if(!state.tabNames) state.tabNames = {...DEFAULT_TAB_NAMES};
      if(!state.upcoming) state.upcoming = [];
      if(state.upcomingNote === undefined) state.upcomingNote = '';
      if(state.weekNote === undefined) state.weekNote = '';
      if(!state.notices) state.notices = [];
      if(!state.theme) state.theme = 'pastel';
      if(!state.layout) state.layout = { railWidth:168, sidebarWidth:230, todayCols:{}, allCols:{}, upCols:{} };
      if(!state.layout.todayCols) state.layout.todayCols = {};
      if(!state.layout.allCols) state.layout.allCols = {};
      if(!state.layout.upCols) state.layout.upCols = {};

  document.getElementById('quick-note').innerHTML = state.quickNote || '';

let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ attemptSave(1); }, 250);
}
async function attemptSave(attempt){
  try{
    const { error } = await supabaseClient
      .from('schedule_app_state')
      .upsert({ user_id: currentUser.id, state: state, updated_at: new Date().toISOString() });
    if(error) throw error;
    flash('Saved');
  }catch(e){
    console.error('Save error (attempt '+attempt+')', e);
    if(attempt < 3){
      flash('Retrying save…');
      setTimeout(()=>{ attemptSave(attempt+1); }, 500 * attempt);
    }else{
      flash('Save failed');
    }
  }
}
function flash(msg){
  const el = document.getElementById('save-note-el');
  el.textContent = msg;
  setTimeout(()=>{ if(el) el.textContent=''; }, 1400);
}

function weekdayOf(d){ return new Date(d+'T00:00:00').getDay(); }
function dayOfMonth(d){ return new Date(d+'T00:00:00').getDate(); }
function occursOn(task, dateStr){
  if(!task.date) return false;
  if(task.repeat === 'none') return dateStr === task.date;
  if(dateStr < task.date) return false;
  if(task.repeat === 'daily') return true;
  if(task.repeat === 'weekly') return weekdayOf(dateStr) === weekdayOf(task.date);
  if(task.repeat === 'monthly') return dayOfMonth(dateStr) === dayOfMonth(task.date);
  return false;
}
function isDoneOn(task, dateStr){
  if(task.repeat === 'none') return !!task.done;
  return !!(state.completions[task.id] && state.completions[task.id][dateStr]);
}
function setDoneOn(task, dateStr, val){
  if(task.repeat === 'none'){ task.done = val; return; }
  if(!state.completions[task.id]) state.completions[task.id] = {};
  state.completions[task.id][dateStr] = val;
}

function tasksForToday(){
  const timeRank = t => t==='T1'?0 : t==='T2'?1 : t==='T3'?2 : 3;
  const priRank = p => p==='high'?0 : p==='mid'?1 : 2;
  return state.tasks.filter(t => occursOn(t, TODAY))
    .sort((a,b)=> (timeRank(a.time)-timeRank(b.time)) || (priRank(a.priority)-priRank(b.priority)));
}
function tasksForAll(){
  return state.tasks.filter(t => t.repeat==='none' && !t.done && t.date !== TODAY)
    .sort((a,b)=> (a.date||'9999').localeCompare(b.date||'9999'));
}
function tasksForDate(dateStr){
  return state.tasks.filter(t => occursOn(t, dateStr));
}
function noticesForDate(dateStr){
  return state.notices.filter(n => dateStr >= n.startDate && dateStr <= n.endDate);
}
function fmtNoticeRange(n){
  return n.startDate === n.endDate ? n.startDate : (n.startDate + ' ~ ' + n.endDate);
}
function noticeColor(n){
  if(n.colorIndex===undefined || n.colorIndex===null) return { bg:'var(--pri-high-bg)', text:'var(--pri-high-text)' };
  return ACTIVE_CATEGORY_PALETTE[n.colorIndex % ACTIVE_CATEGORY_PALETTE.length];
}
let selectedNoticeColorIdx = 0;
function renderColorSwatches(containerId, currentIdx, onSelect){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = '';
  ACTIVE_CATEGORY_PALETTE.forEach((c, idx)=>{
    const sw = document.createElement('div');
    sw.className = 'color-swatch'+(idx===currentIdx?' selected':'');
    sw.style.background = c.bg;
    sw.style.boxShadow = 'inset 0 0 0 2px '+c.text;
    sw.title = 'Choose this color';
    sw.addEventListener('click', ()=> onSelect(idx));
    el.appendChild(sw);
  });
}

function priLabel(p){ return p==='high'?'1':p==='mid'?'2':'3'; }
function priBadge(p){ return {label: priLabel(p), cls: 'badge pri-'+p}; }

function buildPrioritySelect(task, onChange){
  const sel = document.createElement('select');
  sel.className='cell-select badge-select badge pri-'+task.priority;
  ['high','mid','low'].forEach(p=>{
    const opt=document.createElement('option'); opt.value=p; opt.textContent=priLabel(p);
    if(p===task.priority) opt.selected=true; sel.appendChild(opt);
  });
  sel.addEventListener('change', ()=>{
    task.priority=sel.value; sel.className='cell-select badge-select badge pri-'+task.priority;
    onChange();
  });
  return sel;
}
function buildTextInput(task, field, done, placeholder){
  const input = document.createElement('input');
  input.type='text'; input.className='cell-text'+(done?' done':''); input.value=task[field]||'';
  if(placeholder) input.placeholder=placeholder;
  input.addEventListener('change', ()=>{ task[field]=input.value; saveState(); });
  return input;
}
function buildCategoryInput(task){
  const input = document.createElement('input');
  input.type='text'; input.className='cell-text cat-input'; input.value=task.category||'';
  input.placeholder='Category';
  function applyColor(){
    const c = hashColor(input.value.trim());
    if(c){ input.style.background=c.bg; input.style.color=c.text; input.style.fontWeight='500'; input.style.fontSize='12px'; }
    else { input.style.background=''; input.style.color=''; input.style.fontWeight=''; input.style.fontSize=''; }
  }
  applyColor();
  input.addEventListener('input', applyColor);
  input.addEventListener('change', ()=>{ task.category=input.value; saveState(); });
  return input;
}
function buildDateInput(task, onChange){
  const input = document.createElement('input');
  input.type='date'; input.className='cell-date'; input.value=task.date||'';
  input.addEventListener('change', ()=>{ task.date=input.value; onChange(); });
  return input;
}
function buildDeleteBtn(task, onDelete){

// ---------- CALENDAR ----------
function fmtDate(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }
function renderCalendar(){
  document.getElementById('cal-label').textContent = MONTH_NAMES[calMonth]+' '+calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML='';
  DOW_NAMES.forEach(d=>{
    const el=document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for(let i=0;i<firstDay;i++){ const el=document.createElement('div'); el.className='cal-cell empty-cell'; grid.appendChild(el); }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = fmtDate(calYear, calMonth, d);
    const cell = document.createElement('div');
    cell.className='cal-cell'+(dateStr===TODAY?' today':'');
    const dayNotices = noticesForDate(dateStr);
    dayNotices.slice(0,2).forEach(n=>{
      const bar = document.createElement('div'); bar.className='cal-notice-bar';
      const nc = noticeColor(n);
      bar.style.background = nc.bg; bar.style.color = nc.text;
      bar.textContent = n.title;
      cell.appendChild(bar);
    });
    const label = document.createElement('div'); label.className='cal-date'; label.textContent=d;
    cell.appendChild(label);
    const dayTasks = tasksForDate(dateStr);
    if(dayTasks.length>0){
      const withCat = dayTasks.filter(t=>t.category && t.category.trim());
      const withoutCat = dayTasks.filter(t=>!(t.category && t.category.trim()));
      if(withCat.length>0){
        const tagsWrap = document.createElement('div'); tagsWrap.className='cal-tags';
        withCat.slice(0,3).forEach(t=>{
          const c = hashColor(t.category.trim());
          const tag = document.createElement('div'); tag.className='cal-tag';
          tag.style.background=c.bg; tag.style.color=c.text;
          tag.textContent = t.category.trim() + (t.repeat!=='none' ? ' 🔄' : '');
          tagsWrap.appendChild(tag);
        });
        if(dayTasks.length>3){
          const more = document.createElement('div'); more.className='cal-tag-more';
          more.textContent = '+'+(dayTasks.length-3)+' more';
          tagsWrap.appendChild(more);
        }
        cell.appendChild(tagsWrap);
      } else if(withoutCat.length>0){
        const dots = document.createElement('div'); dots.className='cal-dots';
        withoutCat.slice(0,6).forEach(t=>{
          const dot=document.createElement('span');
          dot.className='dot'+(t.priority==='high'?' high':'')+(t.repeat!=='none'?' repeat-dot':'');
          if(t.repeat!=='none') dot.title='Repeats: '+t.repeat;
          dots.appendChild(dot);
        });
        cell.appendChild(dots);
      }
    }
    cell.addEventListener('click', ()=>{ selectedCalDate=dateStr; renderCalDetail(); });
    grid.appendChild(cell);
  }
}

      });

      const tilde = document.createElement('span'); tilde.textContent='~'; tilde.style.color='var(--text-sec)'; tilde.style.flexShrink='0';

      endInput.type='date'; endInput.className='cell-date'; endInput.value=n.endDate;
      endInput.style.flexShrink='0'; endInput.style.width='130px';
      endInput.addEventListener('change', ()=>{
        n.endDate = endInput.value;
        if(n.endDate < n.startDate) n.startDate = n.endDate;
        saveState(); renderCalendar(); renderCalDetail(); renderTodayAlerts();
      });

      const swatchWrap = document.createElement('div');

      const del = document.createElement('button'); del.className='row-del'; del.style.opacity='1'; del.textContent='×';
      del.setAttribute('aria-label','Delete notice');
      del.addEventListener('click', ()=>{
        state.notices = state.notices.filter(x=>x.id!==n.id);
        saveState(); renderCalendar(); renderCalDetail(); renderTodayAlerts();
      });

      row.appendChild(titleInput); row.appendChild(startInput); row.appendChild(tilde); row.appendChild(endInput);
      row.appendChild(swatchWrap); row.appendChild(del);
      noticeWrap.appendChild(row);
      renderColorSwatches(swId, n.colorIndex ?? 5, (idx)=>{
        n.colorIndex = idx;
        saveState(); renderColorSwatches(swId, idx, ()=>{});
        renderCalendar(); renderCalDetail(); renderTodayAlerts();
      });
    });
  }
  document.getElementById('notice-start').value = selectedCalDate;
  document.getElementById('notice-end').value = selectedCalDate;
  renderColorSwatches('notice-color-swatches', selectedNoticeColorIdx, (idx)=>{
    selectedNoticeColorIdx = idx;
    renderColorSwatches('notice-color-swatches', idx, ()=>{});
  });
}

function overdueTasks(){
  return state.tasks.filter(t => t.repeat==='none' && !t.done && t.date && t.date < TODAY);
}
function upcomingNoticesThisWeek(){
  return state.notices.filter(n => n.startDate > TODAY && n.startDate <= WEEK_RANGE.end);
}
function renderTodayAlerts(){
  const wrap = document.getElementById('notice-banner-wrap');
  if(!wrap) return;
  wrap.innerHTML = '';

  const overdue = overdueTasks();
  if(overdue.length>0){
    const b = document.createElement('div'); b.className='banner-alert banner-red';
    const titles = overdue.slice(0,3).map(t=>t.text||'(untitled)').join(', ');
    b.innerHTML = '<span>⚠️</span><div>'+overdue.length+' overdue task'+(overdue.length>1?'s':'')+' — '+titles+(overdue.length>3?', ...':'')+'</div>';
    wrap.appendChild(b);
  }

  const todaysNotices = noticesForDate(TODAY);
  todaysNotices.forEach(n=>{
    const b = document.createElement('div'); b.className='banner-alert';
    const nc = noticeColor(n);
    b.style.background = nc.bg; b.style.color = nc.text;
    b.innerHTML = '<span>📢</span><div><span class="notice-item">'+n.title+'</span><span class="notice-range">('+fmtNoticeRange(n)+')</span></div>';
    wrap.appendChild(b);
  });

  const upcoming = upcomingNoticesThisWeek();
  upcoming.forEach(n=>{
    const b = document.createElement('div'); b.className='banner-alert';
    const nc = noticeColor(n);
    b.style.background = nc.bg; b.style.color = nc.text;
    b.innerHTML = '<span>🔔</span><div>Coming up: <span class="notice-item">'+n.title+'</span><span class="notice-range">('+fmtNoticeRange(n)+')</span></div>';
    wrap.appendChild(b);
  });
}
function updateNavBadge(){

// ---------- MEMO ----------
function renderMemoCats(){
  const row = document.getElementById('memo-cat-row');
  row.innerHTML='';
  const allChip = document.createElement('div');
  allChip.className='memo-cat-chip'+(state.activeMemoCat===undefined || state.activeMemoCat==='__all__'?' active':'');
  allChip.textContent='All';
  allChip.addEventListener('click', ()=>{ state.activeMemoCat='__all__'; renderMemoCats(); renderMemoList(); });
  row.appendChild(allChip);
  state.memoCats.forEach(cat=>{
    const chip = document.createElement('div');
    const isActive = state.activeMemoCat===cat;
    chip.className='memo-cat-chip'+(isActive?' active':'');
    chip.textContent=cat;
    if(!isActive){
      const c = hashColor(cat);
      if(c){ chip.style.background = c.bg; chip.style.color = c.text; chip.style.borderColor = 'transparent'; }
    }
    chip.addEventListener('click', ()=>{ state.activeMemoCat=cat; renderMemoCats(); renderMemoList(); });
    row.appendChild(chip);
  });
  const sel = document.getElementById('memo-cat-select');
  sel.innerHTML='';
  state.memoCats.forEach(cat=>{ const opt=document.createElement('option'); opt.value=cat; opt.textContent=cat; sel.appendChild(opt); });
}
function renderCatEditor(){
  const box = document.getElementById('cat-editor');
  box.innerHTML='';
  state.memoCats.forEach((cat, idx)=>{
    const row = document.createElement('div'); row.className='cat-row';
    const input = document.createElement('input'); input.value=cat; input.style.width='130px';
    input.addEventListener('change', ()=>{
      const oldName = state.memoCats[idx];
      state.memoCats[idx] = input.value.trim() || oldName;
      state.memos.forEach(m=>{ if(m.cat===oldName) m.cat = state.memoCats[idx]; });
      if(state.activeMemoCat===oldName) state.activeMemoCat = state.memoCats[idx];
      saveState(); renderMemoCats(); renderMemoList(); renderCatEditor();
    });
    const del = document.createElement('button'); del.textContent='×';
    del.addEventListener('click', ()=>{
      state.memoCats.splice(idx,1);
      saveState(); renderMemoCats(); renderMemoList(); renderCatEditor();
    });
    row.appendChild(input); row.appendChild(del);
    box.appendChild(row);
  });
  const addRow = document.createElement('div'); addRow.className='cat-row';
  const addInput = document.createElement('input'); addInput.placeholder='New category'; addInput.style.width='130px';
  const addBtn = document.createElement('button'); addBtn.textContent='+';
  addBtn.addEventListener('click', ()=>{
    const v = addInput.value.trim();
    if(v && !state.memoCats.includes(v)){ state.memoCats.push(v); saveState(); renderMemoCats(); renderCatEditor(); }
    addInput.value='';
  });
  addRow.appendChild(addInput); addRow.appendChild(addBtn);
  box.appendChild(addRow);
}
function renderMemoList(){
  const wrap = document.getElementById('memo-list');
  wrap.innerHTML='';
  let memos = [...state.memos];
  const filterCat = state.activeMemoCat;
  if(filterCat && filterCat!=='__all__') memos = memos.filter(m=>m.cat===filterCat);
  memos.sort((a,b)=> b.createdAt.localeCompare(a.createdAt));
  if(memos.length===0){
    wrap.innerHTML = '<div class="empty-row" style="padding:16px 4px;color:var(--text-sec);">No notes yet.</div>';
    return;
  }
  memos.forEach(m=>{
    const item = document.createElement('div'); item.className='memo-item';
    const top = document.createElement('div'); top.className='memo-top';
    const left = document.createElement('div');
    const catColor = hashColor(m.cat);
    const catStyle = catColor ? ' style="background:'+catColor.bg+';color:'+catColor.text+';"' : '';
    left.innerHTML = '<span class="memo-date">'+m.createdAt+'</span> <span class="memo-cat-tag"'+catStyle+'>'+m.cat+'</span>';
    const del = document.createElement('button'); del.className='memo-del'; del.textContent='Delete';
    del.addEventListener('click', ()=>{ state.memos = state.memos.filter(x=>x.id!==m.id); saveState(); renderMemoList(); });
    top.appendChild(left); top.appendChild(del);
    const text = document.createElement('div'); text.className='memo-text'; text.innerHTML=m.text;
    item.appendChild(top); item.appendChild(text);
    wrap.appendChild(item);
  });
}

function applyTabNames(){
  document.querySelectorAll('.tab-label').forEach(el=>{

  });
}

document.querySelectorAll('.tab-edit').forEach(icon=>{
  icon.addEventListener('click', (e)=>{
    e.stopPropagation();
    const key = icon.dataset.key;
    const labelEl = document.querySelector('.tab-label[data-key="'+key+'"]');
    const current = labelEl.textContent;
    const input = document.createElement('input');
    input.type='text'; input.className='tab-label-input'; input.value=current;
    labelEl.replaceWith(input);
    input.focus(); input.select();
    function commit(){
      const val = input.value.trim() || DEFAULT_TAB_NAMES[key];
      state.tabNames[key] = val;
      saveState();
      const newLabel = document.createElement('span');
      newLabel.className='tab-label'; newLabel.dataset.key=key; newLabel.textContent=val;
      input.replaceWith(newLabel);
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', ev=>{ if(ev.key==='Enter'){ input.blur(); } });
    input.addEventListener('click', ev=> ev.stopPropagation());
  });
});

function applyLayout(){
  const railW = Math.min(340, Math.max(140, state.layout.railWidth || 168));
  const sideW = Math.min(420, Math.max(160, state.layout.sidebarWidth || 230));
  state.layout.railWidth = railW;
  state.layout.sidebarWidth = sideW;
  document.querySelector('.rail').style.width = railW + 'px';
  const sb = document.getElementById('today-sidebar');
  if(sb) sb.style.width = sideW + 'px';
  applyColWidths('today', state.layout.todayCols);
  applyColWidths('all', state.layout.allCols);
  applyColWidths('up', state.layout.upCols);
}

function applyColWidths(tableKey, cols){
  Object.keys(cols).forEach(key=>{
    const col = document.getElementById('col-'+tableKey+'-'+key);
    if(col){
      const clamped = Math.min(400, Math.max(40, cols[key]));
      cols[key] = clamped;
      col.style.width = clamped + 'px';
    }
  });
}

function makeResizable(handle, target, {min, max, dir, onCommit}){
  handle.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = target.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(ev){
      let delta = ev.clientX - startX;
      if(dir === 'left') delta = -delta;
      const newWidth = Math.min(max, Math.max(min, startWidth + delta));
      target.style.width = newWidth + 'px';
    }
    function onUp(){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      onCommit(parseInt(target.style.width, 10));
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

makeResizable(document.getElementById('resizer-rail'), document.querySelector('.rail'), {
  min:140, max:340, dir:'right',
  onCommit:(w)=>{ state.layout.railWidth = w; saveState(); }
});
makeResizable(document.getElementById('resizer-sidebar'), document.getElementById('today-sidebar'), {
  min:160, max:420, dir:'left',

});

function makeColumnResizable(handle, colEl, {min, max, tableKey, key}){
  handle.addEventListener('mousedown', (e)=>{
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = colEl.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(ev){
      const delta = ev.clientX - startX;
      const newWidth = Math.min(max, Math.max(min, startWidth + delta));
      colEl.style.width = newWidth + 'px';
    }
    function onUp(){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      handle.classList.remove('active');
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      const finalWidth = parseInt(colEl.style.width, 10);
      const map = { today: state.layout.todayCols, all: state.layout.allCols, up: state.layout.upCols };
      const colsObj = map[tableKey];
      colsObj[key] = finalWidth;
      saveState();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

document.querySelectorAll('.col-resize-handle').forEach(handle=>{
  const tableKey = handle.dataset.table;
  const key = handle.dataset.key;
  const col = document.getElementById('col-'+tableKey+'-'+key);
  if(col) makeColumnResizable(handle, col, { min:40, max:500, tableKey, key });
});

    provider: 'google',
    options: { redirectTo: window.location.href }

});

});

supabaseClient.auth.onAuthStateChange((event, session)=>{
  if(session && session.user){ showApp(session.user); }
  else { showLogin(); }
});

(async ()=>{

  if(data && data.session && data.session.user){ showApp(data.session.user); }
  else { showLogin(); }
})();
